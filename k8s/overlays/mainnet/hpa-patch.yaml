apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stellar-insights-backend
  namespace: stellar-insights-mainnet
spec:
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
