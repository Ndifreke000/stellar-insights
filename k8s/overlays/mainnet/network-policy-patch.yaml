apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: stellar-insights-backend
  namespace: stellar-insights-mainnet
spec:
  podSelector:
    matchLabels:
      app: stellar-insights
      component: backend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow from ingress controller namespace
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
  # Allow from other pods in the same namespace
  - from:
    - podSelector:
        matchLabels:
          app: stellar-insights
  egress:
  # Allow all egress
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53  # DNS
    - protocol: UDP
      port: 53  # DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443  # HTTPS
    - protocol: TCP
      port: 80   # HTTP
