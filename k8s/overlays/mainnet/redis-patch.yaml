apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: stellar-insights-mainnet
data:
  redis.conf: |
    # Network
    bind 0.0.0.0
    port 6379
    tcp-backlog 511
    timeout 0
    tcp-keepalive 300

    # General
    daemonize no
    supervised no
    pidfile /tmp/redis.pid
    loglevel notice
    logfile ""
    databases 16

    # Snapshotting (RDB)
    save 900 1
    save 300 10
    save 60 10000
    stop-writes-on-bgsave-error yes
    rdbcompression yes
    rdbchecksum yes
    dbfilename dump.rdb
    dir /data

    # Replication
    replica-serve-stale-data yes
    replica-read-only yes

    # Security
    protected-mode yes

    # Memory management
    maxmemory 256mb
    maxmemory-policy allkeys-lru

    # Append Only File (AOF) - Enabled for mainnet persistence
    appendonly yes
    appendfilename "appendonly.aof"
    appendfsync everysec
    no-appendfsync-on-rewrite no
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb
