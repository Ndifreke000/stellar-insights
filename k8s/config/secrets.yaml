apiVersion: v1
kind: Secret
metadata:
  name: stellar-insights-secrets
  namespace: stellar-insights
type: Opaque
stringData:
  # Database credentials — referenced as secretKeyRef key: database-url
  database-url: "postgresql://user:password@db.example.com:5432/stellar_insights"

  # Redis — referenced as secretKeyRef key: redis-url
  redis-url: "redis://:password@redis.stellar-insights.svc.cluster.local:6379"

  # JWT signing secret — referenced as secretKeyRef key: jwt-secret
  jwt-secret: "REPLACE_WITH_STRONG_SECRET"

  # AES-256 encryption key — referenced as secretKeyRef key: encryption-key
  encryption-key: "REPLACE_WITH_32_BYTE_HEX_KEY"

  # Sentry DSN
  sentry-dsn: "https://key@sentry.io/project-id"

  # Vault configuration
  vault-addr: "https://vault.stellar-insights.svc.cluster.local:8200"
  vault-skip-verify: "false"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: stellar-insights-backend
  namespace: stellar-insights

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: stellar-insights
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: stellar-insights
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: stellar-insights
subjects:
- kind: ServiceAccount
  name: stellar-insights-backend
  namespace: stellar-insights
