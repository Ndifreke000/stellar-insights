apiVersion: apps/v1
kind: Deployment
metadata:
  name: stellar-insights-backend
  namespace: stellar-insights-mainnet
spec:
  replicas: 3
  template:
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: component
                operator: In
                values:
                - backend
            topologyKey: kubernetes.io/hostname
      containers:
      - name: backend
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
