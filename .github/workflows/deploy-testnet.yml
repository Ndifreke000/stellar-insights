name: Deploy Testnet

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'k8s/**'
      - '.github/workflows/deploy-testnet.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: stellar-insights-backend
  K8S_OVERLAY: k8s/overlays/testnet
  K8S_NAMESPACE: stellar-insights-testnet

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Run unit and integration tests
        working-directory: backend
        env:
          JWT_SECRET: ci-test-secret-value-at-least-32-characters-long
          DATABASE_URL: sqlite::memory:
        run: cargo test --all-features

  build-and-deploy:
    name: Build, Push & Deploy Testnet
    needs: test
    runs-on: ubuntu-latest
    environment: testnet

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/terraform-executor
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:testnet-${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:testnet-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_TESTNET }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Apply testnet overlay
        run: |
          kubectl kustomize "${{ env.K8S_OVERLAY }}" \
            | sed "s|stellar-insights/backend:testnet|${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:testnet-${{ github.sha }}|g" \
            | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/testnet-stellar-insights-backend \
            -n "${{ env.K8S_NAMESPACE }}" --timeout=10m

      - name: Run backend smoke tests
        env:
          NAMESPACE: ${{ env.K8S_NAMESPACE }}
          BACKEND_URL: ${{ vars.TESTNET_BACKEND_URL }}
        run: bash backend/scripts/testnet-smoke-tests.sh

      - name: Post Slack notification
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; skipping notification"
            exit 0
          fi
          STATUS="${{ job.status }}"
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\"Testnet deploy ${STATUS}: \`${{ github.repository }}\` @ \`${{ github.sha }}\` by ${{ github.actor }}\"}"

      - name: Deployment summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Testnet Deployment

          | Field | Value |
          |-------|-------|
          | **Status** | \`${{ job.status }}\` |
          | **Image** | \`testnet-${{ github.sha }}\` |
          | **Overlay** | \`${{ env.K8S_OVERLAY }}\` |
          | **Actor** | @${{ github.actor }} |
          EOF
